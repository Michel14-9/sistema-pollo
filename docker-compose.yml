version: '3.8'
services:
  app:
    build: .
    restart: always
    ports:
      - "${APP_PORT}:8080"
    environment:
      # Usa host.docker.internal para conectar con PostgreSQL del host (tu máquina local)
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/luren_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      RECAPTCHA_SECRET: ${RECAPTCHA_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
    # Elimina depends_on porque ya no necesitas el contenedor db
    # depends_on:
    #   - db
